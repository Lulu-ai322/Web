<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h2>Watch Ad</h2>
<p>Click button to earn 2 coins</p>

<input id="userId" placeholder="Enter Discord ID">
<br><br>
<button onclick="earn()">Watch & Earn</button>
</div>

<script>
async function earn(){
  const userId = document.getElementById("userId").value;

  const res = await fetch("/earn", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const data = await res.json();
  alert("2 Coins Added!");
}
</script>

</body>
</html>
