<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>📊 Earn Coins</h2>

  <div class="ad-box">
    <p>📢 Advertisement Banner</p>
    <div class="fake-ad">Your Ad Here</div>
  </div>

  <button class="btn" onclick="earn()">Watch & Claim 2 Coins</button>

  <p id="msg"></p>
</div>

<script>
function earn() {
  fetch("/api/earn", {
    method: "POST"
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      document.getElementById("msg").innerText = "✅ 2 Coins Added!";
    } else {
      document.getElementById("msg").innerText = "❌ Login required.";
    }
  })
}
</script>

</body>
</html>
